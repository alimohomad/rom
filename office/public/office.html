<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HRAS Office Viewer</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Office computer</p>
          <h1>Live Screen Viewer</h1>
        </div>
        <span id="statusPill" class="pill pill-warn">Waiting</span>
      </section>

      <section class="workspace viewer-layout">
        <aside class="panel controls">
          <label>
            Room
            <input id="roomInput" autocomplete="off">
          </label>
          <label>
            Access code
            <input id="codeInput" type="password" autocomplete="off">
          </label>
          <label>
            Employee screen
            <select id="employeeSelect" disabled>
              <option value="">No receiver connected</option>
            </select>
          </label>
          <label style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="controlToggle" disabled>
            Enable remote control
          </label>
          <button id="connectButton" class="button button-dark" type="button">Connect</button>
          <button id="disconnectButton" class="button button-quiet" type="button" disabled>Disconnect</button>
          <dl class="stats">
            <div>
              <dt>Status</dt>
              <dd id="statusText">Not connected</dd>
            </div>
            <div>
              <dt>Room</dt>
              <dd id="roomLabel">head-office</dd>
            </div>
            <div>
              <dt>Receivers</dt>
              <dd id="receiverCount">0</dd>
            </div>
            <div>
              <dt>Frames</dt>
              <dd id="frameCount">0</dd>
            </div>
            <div>
              <dt>Server</dt>
              <dd id="serverLabel">-</dd>
            </div>
          </dl>
        </aside>

        <div class="stage">
          <img id="remoteFrame" alt="Shared screen">
          <div id="emptyPreview" class="empty-state">
            <strong>Waiting for receiver app</strong>
            <span>Keep this page open while the remote computer starts the HRAS Receiver Agent.</span>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/viewer.js"></script>
  </body>
</html>
